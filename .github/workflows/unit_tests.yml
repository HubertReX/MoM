name: Unit tests

# The plain-Python unit suite (no pytest - see scripts/run_unit_tests.py).
# Runs the same `just` recipe a developer runs locally, so a green CI and a green
# workstation mean the same thing. The runner also fails when a `test_*` function
# is missing from its file's `tests = [...]` list, which is the one mistake the
# hand-written runner lists cannot catch on their own.
#
# The agent-driven UI suites (desktop / web) stay manual: they need a display,
# a browser and a vision model. See web_agent_tests.yml.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

# A newer push supersedes an in-flight run on the same ref.
concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # `just test-unit` calls .venv/bin/python3, so CI needs the same layout a
      # developer gets from `just setup`.
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # --python 3.12 is not optional: uv picks the newest interpreter it can find,
      # and on 3.14 several pinned deps have no wheels and fail to build from source.
      - name: Create .venv and install runtime deps
        run: |
          uv venv --python 3.12
          uv pip install -r requirements.txt

      - name: Install just
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh \
            | bash -s -- --to "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # NO_COLOR keeps the runner's ANSI codes out of the Actions log.
      - name: Run unit tests
        env:
          NO_COLOR: "1"
        run: just test-unit
