
name: Web agent tests (pygbag + Playwright)

# Runs the agent-driven UI smoke suite against the WEB build (pygbag + headless
# Chromium via Playwright). Desktop runs of the same scenarios live in
# tests/automate_display_test.py without --web.
#
# Manual trigger only (matches the repo's other workflows). To also run on PRs,
# add:
#   pull_request:
#     paths: [ "project/**", "tests/**", "utils/**" ]
on: [workflow_dispatch]

jobs:
  web-agent-tests:
    name: Agent UI smoke tests (web / pygbag)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The web runner (WebRunner) and its helpers only need the stdlib +
      # pygbag + playwright - no pygame/OpenGL, so we skip requirements-dev.txt.
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pygbag playwright

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Run web agent smoke scenarios
        run: |
          set -u
          fail=0
          for s in \
            "Corrupt Save Handling" \
            "Web Save in localStorage" \
            "Empty Slot Load" \
            "Save and Load Basic"; do
            echo "::group::$s"
            # CI runners are slower than a dev box: give the WASM game more boot
            # time and pygbag a longer build/serve window (see --timeout in the runner).
            python -u tests/automate_display_test.py --web \
              --timeout 25 --pygbag-timeout 180 "$s" || fail=1
            echo "::endgroup::"
          done
          exit $fail

      - name: Upload agent screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-agent-screenshots
          path: screenshots/agent/
          if-no-files-found: warn
