# === Quests ===
# Reward labels appended to a quest's success line (D3=A). The "Success" text in
# doc/EN/Quests/ is plain prose with no {value} - the numbers live in the
# rewards, so rebalancing them never touches a translation.

[quest]
journal = "QUEST LOG"
counter = "{total} quests · {done} completed"
threads = "THREADS"
details = "DETAILS"
steps = "STEPS"
reward = "REWARD"
result = "OUTCOME"
manual = "manual"
empty = "No quests match this filter."
filter_active = "Active"
filter_done = "Completed"
filter_all = "All"
hints = "{W}/{S} select   {A}/{D} filter   {Enter} expand/collapse   {J}/{Esc} close"
scroll_hint = "{Space} scroll"
reward_money = "[num]+{value}[/num] :golden_coin:"
reward_health = "[num]+{value}[/num] :heart:"
reward_max_health = "[num]+{value}[/num] max HP"
reward_damage = "[num]+{value}[/num] damage"
reward_max_items = "[num]+{value}[/num] slot(s)"
reward_sentiment = "[num]+{value}[/num] favour"
toast_done = "Completed: {name}"
toast_thread_done = "Thread closed: {name}"
