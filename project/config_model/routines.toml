# Rutyny NPC - rytm dnia wspólny dla wielu postaci.
#
# Ten plik trzyma SAME rutyny. O tym kto używa którą rutyną, mówi kolumna `routine`
# w `characters.csv` - obok kolumn `home`/`work`/`social`/`hobby`, z którymi
# rutyna i tak współpracuje. Dzięki temu cały "kto, co, gdzie" jednej postaci
# czyta się z jednego wiersza. Pusta komórka = brak rutyny (stara krzywej
# z warstwy `waypoints` na mapie Tiled).
#
# `at` ma trzy warianty:
#   type:<typ>       -> kolumna `home`/`work`/`social`/`hobby` w characters.csv
#                       wskazuje nazwę obiektu z warstwy `places` w Tiled.
#                       To on czyni rutynę uniwersalną - każda postać idzie
#                       "do swojego" miejsca danego typu.
#   location:<nazwa> -> wprost nazwa obiektu z warstwy `places` (wyjątki,
#                       miejsca wspolne dla wszystkich)
#   route:<nazwa>    -> nazwana krzywej z istniejacej warstwy `waypoints`
#
# Kolejność wykonania bierze się z pola `from`, nie z kolejnosci w pliku.
# Przestawienie bloków ani dopisanie kroku w środku niczego nie psuje.
#
# Pusta komórka destynacji w `characters.csv` nie jest bledem: taki krok
# degraduje sie do "zostań gdzie jesteś", a nie do wyjatku. Dzięki temu
# niekompletne dane nigdy nie wywalają gry i nie trzeba mapować całej wioski
# na raz.

[defaults]
wander_radius       = 3     # promien mikro-wędrowki, w kaflach
slot_jitter_minutes = 20    # +/- czasu 'from', deterministycznie z hasha nazwy NPC


# =====================================================================
#  townsfolk - kupiec, kowal, barman: dom, praca, lunch, praca, dom
# =====================================================================

[[routine.townsfolk.slot]]
from     = "06:30"
at       = "type:home"
activity = "idle"

[[routine.townsfolk.slot]]
from     = "08:00"
at       = "type:work"
activity = "stand"

[[routine.townsfolk.slot]]
from     = "13:00"
at       = "type:social"
activity = "wander"

[[routine.townsfolk.slot]]
from     = "14:00"
at       = "type:work"
activity = "stand"

[[routine.townsfolk.slot]]
from     = "18:30"
at       = "type:hobby"
activity = "wander"

[[routine.townsfolk.slot]]
from     = "20:00"
at       = "type:home"
activity = "sleep"

# =====================================================================
#  barman - nie przerywa pracy w porze lunchu
# =====================================================================

[[routine.barman.slot]]
from     = "07:30"
at       = "type:home"
activity = "idle"

[[routine.barman.slot]]
from     = "08:00"
at       = "type:work"
activity = "stand"

[[routine.barman.slot]]
from     = "22:00"
at       = "type:home"
activity = "sleep"


# =====================================================================
#  farmer - wstaje przed świtem, długa praca w polu, wczesniej śpi
# =====================================================================

[[routine.farmer.slot]]
from     = "05:30"
at       = "type:work"
activity = "stand"

[[routine.farmer.slot]]
from     = "11:00"
at       = "location:well"      # wspólna studnia, nie "swoja" - stad location:
activity = "idle"

[[routine.farmer.slot]]
from     = "12:00"
at       = "type:work"
activity = "stand"

[[routine.farmer.slot]]
from     = "18:00"
at       = "type:social"
activity = "wander"

[[routine.farmer.slot]]
from     = "21:00"
at       = "type:home"
activity = "sleep"


# =====================================================================
#  guard - patrol dzienny, patrol wieczorny, krotka noc
# =====================================================================

[[routine.guard.slot]]
from     = "06:00"
at       = "route:patrol_north"
activity = "patrol"

[[routine.guard.slot]]
from     = "18:00"
at       = "route:patrol_south"
activity = "patrol"

[[routine.guard.slot]]
from     = "02:00"
at       = "type:home"
activity = "sleep"

# Rutyny `farmer` i `guard` nie maja dziś żadnej obsady - są gotowymi
# szablonami na postacie, których na mapie jeszcze nie ma. Żeby którąś
# obsadzic, wpisz jej klucz w kolumnie `routine` w `characters.csv`.
